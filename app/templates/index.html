{% extends "layout.html" %}
{% block content %}

<div class="grid-2">

    <!-- STATIC LOG ANALYSIS -->
    <div class="card fade-in">
        <h2>Static Log Analysis</h2>
        <p class="text-muted" style="margin-bottom: var(--space-lg);">
            Upload a .log, .txt, or .xml file and get fully structured results.
        </p>

        <a href="/upload">
            <button class="btn-primary">Analyze Log File</button>
        </a>
    </div>

    <!-- ANDROID REAL-TIME MONITORING -->
    <div class="card fade-in">

        <h2>Android Real-Time Monitoring</h2>

        <div class="status-row">
            <div id="android-status-dot" class="status-dot off"></div>
            <div id="android-status-text">Not connected</div>
        </div>

        <button id="btn-check" class="btn-primary" style="margin-bottom: var(--space-md);">
            Check Device
        </button>

        <div id="android-guidance"></div>

        <div id="device-select-row" class="hidden">
            <label for="device-select">Select device:</label>
            <select id="device-select"></select>
        </div>

        <div id="android-device-info" class="device-info hidden">
            <strong>Model:</strong> <span id="d-model"></span><br>
            <strong>Android:</strong> <span id="d-version"></span><br>
            <strong>Serial:</strong> <span id="d-serial"></span>
        </div>

        <div class="action-row">
            <button id="btn-start" class="btn-primary">Start</button>
            <button id="btn-stop" class="btn-danger hidden">Stop</button>
            <button id="btn-disconnect" class="btn-secondary hidden">Disconnect</button>
        </div>
    </div>

</div>

{% endblock %}
